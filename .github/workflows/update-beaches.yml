# Phase 2 fallback scheduler for platforms without built-in cron.
# Pings the update endpoint every 12 hours. Configure repository secrets:
#   APP_URL      - deployed base URL, e.g. https://whatahotel.example.com
#   CRON_SECRET  - must match the app's CRON_SECRET env var
name: Update beach conditions

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger beach update
        run: |
          curl -fsS -X POST "${APP_URL}/api/cron/update-beaches" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -w "\nHTTP %{http_code}\n"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
